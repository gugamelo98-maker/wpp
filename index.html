<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguarde...</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #111;
  }
  .wrap { text-align: center; padding: 2rem; }
  .logo {
    width: 64px; height: 64px;
    background: #25D366;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .logo svg { width: 36px; height: 36px; fill: #fff; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
  p { font-size: 0.95rem; color: #555; margin-bottom: 1.5rem; }
  .btn {
    display: inline-block;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 2rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    border: none;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid #e0e0e0;
    border-top-color: #25D366;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 2.82.736 5.469 2.027 7.773L0 32l8.437-2.013A15.937 15.937 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm7.844 22.637c-.328.923-1.634 1.69-2.677 1.913-.714.152-1.646.273-4.787-1.029-4.014-1.652-6.597-5.72-6.797-5.985-.193-.265-1.62-2.154-1.62-4.109 0-1.955 1.023-2.916 1.385-3.317.362-.4.79-.5 1.053-.5.263 0 .527.003.757.013.243.01.568-.092.888.678.328.78 1.117 2.74 1.215 2.94.098.2.164.435.033.7-.131.265-.197.43-.394.66-.196.23-.413.515-.589.692-.196.198-.4.412-.172.808.23.397 1.016 1.68 2.184 2.722 1.5 1.34 2.768 1.753 3.164 1.95.395.197.625.165.856-.098.23-.263.986-1.15 1.25-1.546.263-.395.525-.329.888-.197.362.131 2.307 1.088 2.703 1.285.396.197.66.296.757.46.098.166.098.955-.23 1.878z"/>
    </svg>
  </div>
  <div class="spinner"></div>
  <h1>Conectando...</h1>
  <p>Você será redirecionado em instantes.</p>
  <a class="btn" id="manual-btn" href="#" onclick="redirect(); return false;">Abrir WhatsApp</a>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO — edite apenas estas variáveis
// ============================================================
var PHONE    = "5548996077545";   // número com DDI+DDD, sem espaços ou símbolos
var MESSAGE  = "Olá! Vim pelo anúncio e gostaria de mais informações."; // mensagem pré-preenchida (pode deixar vazio "")
// ============================================================

function buildUrl(phone, msg) {
  var base = "https://api.whatsapp.com/send";
  var url = base + "?phone=" + encodeURIComponent(phone);
  if (msg) url += "&text=" + encodeURIComponent(msg);
  return url;
}

function redirect() {
  var url = buildUrl(PHONE, MESSAGE);
  window.location.href = url;
}

// Redireciona automaticamente após 1.2 s
setTimeout(redirect, 1200);
</script>
</body>
</html>
